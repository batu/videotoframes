name: CI

# Project-customized copy of the agency uv CI template (this edit releases it
# from agency management): frame-extraction tests shell out to ffprobe/ffmpeg,
# which the runner image does not ship.

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest -q
      - run: uv run ruff check
